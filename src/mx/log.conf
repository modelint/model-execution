[loggers]
keys=root,MXLogger,PyralLogger

[logger_PyralLogger]
level=WARNING
handlers=fileHandler
qualname=pyral
propagate=0

[handlers]
keys=fileHandler, consoleHandler

[formatters]
keys=MXFormatter

[logger_root]
level=DEBUG
handlers=fileHandler, consoleHandler

[logger_MXLogger]
level=DEBUG
handlers=fileHandler, consoleHandler
qualname=MXLogger
propagate=0

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=MXFormatter
args=('mx.log', 'w')

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=MXFormatter
args=(sys.stdout,)

[formatter_MXFormatter]
class=log_table_config.TableAwareFormatter
format= MX: %(name)s - %(levelname)s - %(message)s