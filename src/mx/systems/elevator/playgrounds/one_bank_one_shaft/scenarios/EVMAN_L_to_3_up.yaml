# Scenario definition
# Define a specific scenario and what is expected to happen
# When we use the term 'user' we are referring to whoever is running the scenario

# Scenario section
# General information about the scenario
# --
# name - name of the scenario
# description - explain what is going on, what is being tested, etc
# domains - what domains are executing in this scenario (any others will be stubbed out)
# --
# Interactions section
# What is expected to happen in terms of stimuli, responses, and scenario timing
# Each component plays out in sequence beginning with an initial stimulus
# --
# stimulus - a scenario action injected into a target domain
# delay - optional wait time before injection specifies as a number and units <min, s, ms>
# to - the target domain
# type - what to inject (event, domain operation)
# name - name of the event or operation
# class - destination of an event
# instance - destination of an event as one or more identifier attribute values for a single identifier of the class
# --
# response - something that happens in a domain
# This may prompt further action by the scenario director to move things along
# or requires a notification to the scenario user
# type - what happened (external event, ...)
# --
# external event response
# --
# from - domain where it happened
# to - domain destination (this domain may or may not be present in the executing system)
# ee - if external event, the target EE in the from domain
# name - name of the response (external event name, ...)
# class - source of the response
# instance - source of the response as one or more identifier attribute values for a single identifier of the class
# --
# condition response
# --
# from - domain where the condition occurred
# notify - which domains should be notified (if domains are not present in executing system, we just notify the user)
# condition - what happened in the from domain (state entry, attribute write,
# class - source of the condition
# instance - source of the condition as one or more identifier attribute values for a single identifier of the class
# state - if state entry, name of the entered state


Scenario:
  name: S1 up L to 3
  description: >
    Cabin with door closed at L going up services stop request at 3
  domains: [EVMAN] # Only testing the application domain for now

Actors:
  internal:
    EVMAN:
      'ASLEV<S1-3>':
        class_name: 'Accessible Shaft Level'
        instance:
          Shaft: S1
          Floor: 3
      'XFER<S1>':
        class_name: 'Transfer'
        instance:
          Shaft: S1
      'Cabin<S1>':
        class_name: 'Cabin'
        instance:
          Shaft: S1
      'Door<S1>':
        class_name: 'Door'
        instance:
          Shaft: S1
  external:
    - UI
    - TRANS
    - SIO


Interactions:
  - description: 'Send the initial stop request to ASLEV S1-3'
    direction: stimulus
    action: signal instance
    name: Stop request
    source: UI
    target: 'ASLEV<S1-3>'

  - description: 'UI updated with request'
    direction: response
    action: external event
    name: Set destination
    source: 'XFER<S1>'
    target: UI

  - description: 'Cabin S1 requests transport from TRANS'
    direction: response
    action: external event
    name: Go to floor
    source: 'Cabin<S1>'
    target: TRANS
    parameters:
      dest floor: '3'

  - description: 'TRANS reports passing floor 1 to Cabin'
    delay: 7.0
    direction: stimulus
    action: signal instance
    name: Passing floor
    source: TRANS
    target: 'Cabin<S1>'
    parameters:
      floor: '1'

  - description: 'Cabin reports passing floor 1 to UI'
    direction: response
    action: external event
    name: Passing floor
    source: 'Cabin<S1>'
    target: UI
    parameters:
      floor: '1'

  - description: 'TRANS reports passing floor 2 to Cabin'
    delay: 2.5
    direction: stimulus
    action: signal instance
    name: Passing floor
    source: TRANS
    target: 'Cabin<S1>'
    parameters:
      floor: '2'

  - description: 'Cabin reports passing floor 2 to UI'
    direction: response
    action: external event
    name: Passing floor
    source: 'Cabin<S1>'
    target: UI
    parameters:
      floor: '2'

  - description: 'TRANS reports passing floor 3 to Cabin'
    delay: 4.0
    direction: stimulus
    action: signal instance
    name: Passing floor
    source: TRANS
    target: 'Cabin<S1>'
    parameters:
      floor: '3'

  - description: 'Cabin reports passing floor 3 to UI'
    direction: response
    action: external event
    name: Passing floor
    source: 'Cabin<S1>'
    target: UI
    parameters:
      floor: '3'

  - description: 'TRANS notifies Cabin that it has arrived'
    direction: stimulus
    action: signal instance
    name: Arrived at floor
    source: TRANS
    target: 'Cabin<S1>'

  - description: 'Cabin reports arrival to UI'
    direction: response
    action: external event
    name: Cabin arrived
    source: 'Cabin<S1>'
    target: UI

  - description: 'ASLEV state entry implicitly requests clear stop request to UI'
    direction: response
    action: external event
    name: Clear stop request
    source: 'ASLEV<S1-3>'
    target: UI

  - description: 'OPENING state implicitly requests door open and notifies UI'
    direction: response
    action: external event
    name: Door opening
    source: 'Door<S1>'
    target: [SIO, UI]

  - description: 'SIO notifies Door that it has opened'
    delay: 3.0
    direction: stimulus
    action: signal instance
    name: Door opened
    source: SIO
    target: 'Door<S1>'

  - description: 'OPEN state implicitly notifies UI that door is open'
    direction: response
    action: external event
    name: Door opened
    source: 'Door<S1>'
    target: UI

  - description: 'CLOSING state implicitly requests door close and notifies UI'
    direction: response
    action: external event
    name: Door closing
    source: 'Door<S1>'
    target: [SIO, UI]

